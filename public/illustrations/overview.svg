<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="t d">
  <title id="t">コンテナハンズオンの流れ</title>
  <desc id="d">Podmanでコンテナを作り、k3sで公開し、アプリ開発へ進む流れを表した図</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".12"/>
    </filter>
  </defs>

  <rect width="960" height="420" rx="0" fill="url(#bg)"/>

  <g transform="translate(54 58)">
    <text x="0" y="0" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">Podman と k3s で、作って動かして公開する</text>
    <text x="0" y="34" font-size="15" font-family="Arial, sans-serif" fill="#475569">image / container / manifest / service / ingress</text>
  </g>

  <g fill="none" stroke="url(#line)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M264 232 C326 232 336 160 398 160"/>
    <path d="M538 160 C598 160 604 232 666 232"/>
    <path d="M538 252 C598 252 604 232 666 232"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="58" y="138" width="214" height="154" rx="10" fill="#0f172a"/>
    <rect x="58" y="138" width="214" height="32" rx="10" fill="#1e293b"/>
    <circle cx="80" cy="154" r="5" fill="#ef4444"/>
    <circle cx="98" cy="154" r="5" fill="#f59e0b"/>
    <circle cx="116" cy="154" r="5" fill="#22c55e"/>
    <text x="82" y="204" font-size="18" font-family="Menlo, Consolas, monospace" fill="#bfdbfe">$ podman build</text>
    <text x="82" y="235" font-size="18" font-family="Menlo, Consolas, monospace" fill="#bbf7d0">$ podman run</text>
    <text x="82" y="266" font-size="18" font-family="Menlo, Consolas, monospace" fill="#fde68a">$ curl :8080</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="382" y="94" width="176" height="132" rx="12" fill="#ffffff"/>
    <rect x="414" y="126" width="112" height="72" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <path d="M428 146h84M428 164h64M428 182h76" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round"/>
    <text x="426" y="256" font-size="16" font-family="Arial, sans-serif" font-weight="700" fill="#1e3a8a">Container image</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="382" y="242" width="176" height="92" rx="12" fill="#ffffff"/>
    <path d="M418 288h104" stroke="#16a34a" stroke-width="3"/>
    <rect x="404" y="268" width="48" height="40" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <rect x="488" y="268" width="48" height="40" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="419" y="293" font-size="13" font-family="Arial, sans-serif" font-weight="700" fill="#166534">Pod</text>
    <text x="503" y="293" font-size="13" font-family="Arial, sans-serif" font-weight="700" fill="#166534">Pod</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="676" y="118" width="224" height="196" rx="14" fill="#ffffff"/>
    <rect x="706" y="150" width="164" height="36" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="750" y="174" font-size="15" font-family="Arial, sans-serif" font-weight="700" fill="#1d4ed8">Ingress</text>
    <path d="M788 188v30" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
    <rect x="706" y="218" width="164" height="36" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="752" y="242" font-size="15" font-family="Arial, sans-serif" font-weight="700" fill="#15803d">Service</text>
    <path d="M788 256v22" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
    <circle cx="744" cy="290" r="13" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <circle cx="788" cy="290" r="13" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <circle cx="832" cy="290" r="13" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  </g>
</svg>
