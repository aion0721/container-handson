<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="t d">
  <title id="t">Kubernetes ハンズオンの全体像</title>
  <desc id="d">Manifest から Deployment、Service、Ingress、Pod へつながる流れ</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" x2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-20%" width="124%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".12"/>
    </filter>
  </defs>

  <rect width="960" height="360" fill="url(#bg)"/>
  <text x="54" y="58" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">Manifest で k3s に desired state を渡す</text>
  <text x="54" y="90" font-size="15" font-family="Arial, sans-serif" fill="#475569">deployment / service / ingress / rollout</text>

  <path d="M262 202h78M594 202h62" stroke="url(#flow)" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="76" y="126" width="186" height="156" rx="12" fill="#ffffff"/>
    <rect x="110" y="154" width="118" height="92" rx="9" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <path d="M126 178h70M126 200h48M126 222h82" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round"/>
    <text x="122" y="314" font-size="16" font-family="Arial, sans-serif" font-weight="700" fill="#1e3a8a">Manifest</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="340" y="112" width="254" height="188" rx="16" fill="#ffffff"/>
    <rect x="372" y="146" width="190" height="44" rx="9" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="420" y="174" font-size="15" font-family="Arial, sans-serif" font-weight="700" fill="#1d4ed8">Deployment</text>
    <path d="M468 192v26" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
    <circle cx="410" cy="238" r="19" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <circle cx="468" cy="238" r="19" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <circle cx="526" cy="238" r="19" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="429" y="326" font-size="16" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">Pods in k3s</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="656" y="126" width="228" height="156" rx="14" fill="#ffffff"/>
    <rect x="686" y="154" width="168" height="34" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="738" y="177" font-size="14" font-family="Arial, sans-serif" font-weight="700" fill="#15803d">Service</text>
    <path d="M770 190v20" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
    <rect x="686" y="210" width="168" height="34" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="739" y="233" font-size="14" font-family="Arial, sans-serif" font-weight="700" fill="#1d4ed8">Ingress</text>
    <path d="M770 144v-20" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
    <text x="702" y="314" font-size="16" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">HTTP access</text>
  </g>
</svg>
