<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="t d">
  <title id="t">Podman ハンズオンの流れ</title>
  <desc id="d">イメージ取得、コンテナ起動、ビルド、保存を体験する流れ</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" x2="1">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset=".55" stop-color="#f97316"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-20%" width="124%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".12"/>
    </filter>
  </defs>

  <rect width="960" height="360" fill="url(#bg)"/>
  <text x="54" y="58" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">Podman でコンテナの基本を触る</text>
  <text x="54" y="90" font-size="15" font-family="Arial, sans-serif" fill="#475569">pull / run / build / save</text>

  <path d="M250 204h72M458 204h72M664 204h72" stroke="url(#flow)" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="74" y="138" width="176" height="132" rx="12" fill="#ffffff"/>
    <path d="M126 178h72M126 202h54M126 226h82" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
    <rect x="108" y="158" width="108" height="88" rx="9" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="128" y="302" font-size="16" font-family="Arial, sans-serif" font-weight="700" fill="#991b1b">Image</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="322" y="138" width="136" height="132" rx="12" fill="#ffffff"/>
    <rect x="356" y="172" width="68" height="58" rx="10" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
    <path d="M368 194h44M368 212h30" stroke="#ea580c" stroke-width="5" stroke-linecap="round"/>
    <text x="350" y="302" font-size="16" font-family="Arial, sans-serif" font-weight="700" fill="#9a3412">Container</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="530" y="112" width="134" height="184" rx="12" fill="#0f172a"/>
    <rect x="530" y="112" width="134" height="30" rx="12" fill="#1e293b"/>
    <circle cx="550" cy="127" r="4" fill="#ef4444"/>
    <circle cx="566" cy="127" r="4" fill="#f59e0b"/>
    <circle cx="582" cy="127" r="4" fill="#22c55e"/>
    <text x="552" y="178" font-size="15" font-family="Menlo, Consolas, monospace" fill="#bfdbfe">FROM</text>
    <text x="552" y="204" font-size="15" font-family="Menlo, Consolas, monospace" fill="#bbf7d0">COPY</text>
    <text x="552" y="230" font-size="15" font-family="Menlo, Consolas, monospace" fill="#fde68a">BUILD</text>
    <text x="552" y="326" font-size="16" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">Containerfile</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="736" y="138" width="150" height="132" rx="12" fill="#ffffff"/>
    <path d="M778 196c0-22 15-38 36-38s36 16 36 38-15 38-36 38-36-16-36-38z" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <path d="M794 196h40M814 176v40" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round"/>
    <text x="781" y="302" font-size="16" font-family="Arial, sans-serif" font-weight="700" fill="#1e3a8a">Share</text>
  </g>
</svg>
