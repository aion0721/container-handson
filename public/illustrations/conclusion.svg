<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="t d">
  <title id="t">学習の振り返り</title>
  <desc id="d">Podman の基礎から Kubernetes の運用体験、次の学習へ進む流れ</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#f5f3ff"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" x2="1">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset=".45" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-20%" width="124%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".12"/>
    </filter>
  </defs>

  <rect width="960" height="360" fill="url(#bg)"/>
  <text x="54" y="58" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">ここから運用と自動化へ広げていく</text>
  <text x="54" y="90" font-size="15" font-family="Arial, sans-serif" fill="#475569">logs / exec / scale / config / ci-cd</text>

  <path d="M194 220 C270 160 344 160 420 220 S570 280 646 220 S786 160 864 220" fill="none" stroke="url(#flow)" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <circle cx="160" cy="220" r="54" fill="#ffffff"/>
    <path d="M132 208h56M132 228h38" stroke="#ef4444" stroke-width="6" stroke-linecap="round"/>
    <text x="130" y="312" font-size="15" font-family="Arial, sans-serif" font-weight="700" fill="#991b1b">Basic</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="376" cy="190" r="54" fill="#ffffff"/>
    <rect x="348" y="166" width="56" height="48" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <path d="M360 186h32M360 202h22" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round"/>
    <text x="346" y="288" font-size="15" font-family="Arial, sans-serif" font-weight="700" fill="#1e3a8a">Deploy</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="592" cy="250" r="54" fill="#ffffff"/>
    <circle cx="570" cy="250" r="15" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <circle cx="614" cy="250" r="15" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <path d="M570 224v-18M614 224v-18M570 206h44" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>
    <text x="560" y="340" font-size="15" font-family="Arial, sans-serif" font-weight="700" fill="#166534">Operate</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="808" cy="190" r="54" fill="#ffffff"/>
    <path d="M786 190h44M808 168v44" stroke="#7c3aed" stroke-width="6" stroke-linecap="round"/>
    <circle cx="808" cy="190" r="34" fill="none" stroke="#ddd6fe" stroke-width="8"/>
    <text x="782" y="288" font-size="15" font-family="Arial, sans-serif" font-weight="700" fill="#5b21b6">Next</text>
  </g>
</svg>
