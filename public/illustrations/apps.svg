<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="t d">
  <title id="t">アプリ開発とコンテナ活用</title>
  <desc id="d">コードを書き、イメージをビルドし、レジストリ経由で k3s にデプロイする流れ</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#f0fdf4"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" x2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset=".5" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-20%" width="124%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".12"/>
    </filter>
  </defs>

  <rect width="960" height="360" fill="url(#bg)"/>
  <text x="54" y="58" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">アプリを作って、イメージにして、k3s へ</text>
  <text x="54" y="90" font-size="15" font-family="Arial, sans-serif" fill="#475569">code / build / registry / deploy</text>

  <path d="M244 202h60M448 202h60M652 202h60" stroke="url(#flow)" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="68" y="130" width="176" height="144" rx="12" fill="#ffffff"/>
    <rect x="102" y="158" width="108" height="82" rx="9" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
    <path d="M124 184l-18 16 18 16M188 184l18 16-18 16M150 220l18-42" stroke="#6d28d9" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="134" y="306" font-size="16" font-family="Arial, sans-serif" font-weight="700" fill="#5b21b6">Code</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="304" y="130" width="144" height="144" rx="12" fill="#0f172a"/>
    <rect x="304" y="130" width="144" height="30" rx="12" fill="#1e293b"/>
    <circle cx="324" cy="145" r="4" fill="#ef4444"/>
    <circle cx="340" cy="145" r="4" fill="#f59e0b"/>
    <circle cx="356" cy="145" r="4" fill="#22c55e"/>
    <text x="328" y="190" font-size="15" font-family="Menlo, Consolas, monospace" fill="#bfdbfe">build</text>
    <text x="328" y="218" font-size="15" font-family="Menlo, Consolas, monospace" fill="#bbf7d0">test</text>
    <text x="328" y="306" font-size="16" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">Build</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="508" y="130" width="144" height="144" rx="12" fill="#ffffff"/>
    <path d="M548 206c0-24 16-42 38-42s38 18 38 42-16 42-38 42-38-18-38-42z" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <path d="M566 206h40M586 186v40" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round"/>
    <text x="548" y="306" font-size="16" font-family="Arial, sans-serif" font-weight="700" fill="#1e3a8a">Registry</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="712" y="130" width="178" height="144" rx="12" fill="#ffffff"/>
    <rect x="744" y="158" width="114" height="34" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="770" y="181" font-size="14" font-family="Arial, sans-serif" font-weight="700" fill="#15803d">Deploy</text>
    <circle cx="772" cy="226" r="15" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <circle cx="828" cy="226" r="15" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="766" y="306" font-size="16" font-family="Arial, sans-serif" font-weight="700" fill="#166534">k3s</text>
  </g>
</svg>
