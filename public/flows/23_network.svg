<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" role="img" aria-labelledby="t d">
  <title id="t">Service と Ingress の構成図</title>
  <desc id="d">Service はポート番号でアクセスし、Ingress はホスト名でアクセスを振り分ける構成</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0l10 5-10 5z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="920" height="260" rx="14" fill="#f8fafc"/>
  <text x="40" y="42" font-size="22" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">Service はポート、Ingress は名前でアクセスする</text>

  <rect x="52" y="104" width="150" height="92" rx="12" fill="#0f172a"/>
  <rect x="52" y="104" width="150" height="30" rx="12" fill="#1e293b"/>
  <text x="72" y="156" font-size="14" font-family="Menlo, Consolas, monospace" fill="#bbf7d0">curl :30083</text>
  <text x="72" y="178" font-size="14" font-family="Menlo, Consolas, monospace" fill="#bfdbfe">curl host</text>

  <rect x="300" y="64" width="560" height="168" rx="16" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="324" y="96" font-size="15" font-family="Arial, sans-serif" font-weight="700" fill="#1d4ed8">k3s cluster</text>
  <rect x="346" y="122" width="134" height="48" rx="9" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="382" y="152" font-size="14" font-family="Arial, sans-serif" font-weight="700" fill="#1d4ed8">Ingress</text>
  <rect x="542" y="122" width="134" height="48" rx="9" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="584" y="152" font-size="14" font-family="Arial, sans-serif" font-weight="700" fill="#15803d">Service</text>
  <circle cx="738" cy="146" r="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <circle cx="794" cy="146" r="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="744" y="198" font-size="13" font-family="Arial, sans-serif" fill="#64748b">Pods</text>

  <path d="M206 148h128" stroke="#64748b" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="224" y="122" font-size="13" font-family="Arial, sans-serif" fill="#475569">:30083 または</text>
  <text x="224" y="140" font-size="13" font-family="Arial, sans-serif" fill="#475569">my-httpd.localhost</text>
  <path d="M484 146h46" stroke="#64748b" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M680 146h36" stroke="#64748b" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
</svg>
