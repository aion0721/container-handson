<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" role="img" aria-labelledby="t d">
  <title id="t">コンテナのメリットの構成図</title>
  <desc id="d">同じイメージから複数コンテナを作り、それぞれが分離され、作り直しや保存ができることを表した図</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0l10 5-10 5z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="920" height="260" rx="14" fill="#f8fafc"/>
  <text x="40" y="42" font-size="22" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">同じイメージから、分離されたコンテナを何度でも作れる</text>

  <rect x="72" y="106" width="144" height="88" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <rect x="106" y="132" width="76" height="36" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="98" y="222" font-size="15" font-family="Arial, sans-serif" font-weight="700" fill="#1d4ed8">httpd image</text>

  <rect x="350" y="72" width="174" height="70" rx="12" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="386" y="114" font-size="15" font-family="Arial, sans-serif" font-weight="700" fill="#166534">merit-httpd-1</text>
  <rect x="350" y="168" width="174" height="70" rx="12" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="386" y="210" font-size="15" font-family="Arial, sans-serif" font-weight="700" fill="#166534">merit-httpd-2</text>

  <rect x="676" y="92" width="170" height="112" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <text x="724" y="124" font-size="15" font-family="Arial, sans-serif" font-weight="700" fill="#5b21b6">Image tar</text>
  <path d="M724 150h74M724 170h52" stroke="#7c3aed" stroke-width="5" stroke-linecap="round"/>
  <text x="692" y="230" font-size="13" font-family="Arial, sans-serif" fill="#64748b">save / load で配布</text>

  <path d="M220 144c44-44 78-44 118-44" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M220 156c44 44 78 44 118 44" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M530 108h134" stroke="#94a3b8" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
  <text x="548" y="92" font-size="13" font-family="Arial, sans-serif" fill="#64748b">片方だけ変更</text>
  <path d="M524 204h140" stroke="#64748b" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="548" y="192" font-size="13" font-family="Arial, sans-serif" fill="#64748b">作り直し・保存</text>
</svg>
