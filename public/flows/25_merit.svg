<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" role="img" aria-labelledby="t d">
  <title id="t">クラスターのメリットの構成図</title>
  <desc id="d">Deployment が複数 Pod を管理し、スケール、自然復旧、ローリングアップデートを行う構成</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0l10 5-10 5z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="920" height="260" rx="14" fill="#f8fafc"/>
  <text x="40" y="42" font-size="22" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">Deployment が Pod の数と更新を管理する</text>

  <rect x="56" y="74" width="230" height="136" rx="14" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="94" y="106" font-size="15" font-family="Arial, sans-serif" font-weight="700" fill="#1d4ed8">Deployment</text>
  <text x="94" y="132" font-size="13" font-family="Arial, sans-serif" fill="#64748b">replicas: 2 → 4</text>
  <text x="94" y="156" font-size="13" font-family="Arial, sans-serif" fill="#64748b">rollout / undo</text>

  <rect x="382" y="54" width="440" height="176" rx="16" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="410" y="86" font-size="15" font-family="Arial, sans-serif" font-weight="700" fill="#166534">Pods</text>
  <circle cx="452" cy="136" r="22" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <circle cx="526" cy="136" r="22" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <circle cx="600" cy="136" r="22" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <circle cx="674" cy="136" r="22" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <rect x="724" y="108" width="64" height="56" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="738" y="141" font-size="13" font-family="Arial, sans-serif" font-weight="700" fill="#c2410c">v2</text>
  <text x="432" y="194" font-size="13" font-family="Arial, sans-serif" fill="#64748b">scale / recreate / rolling update</text>

  <path d="M292 142h78" stroke="#64748b" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="306" y="128" font-size="13" font-family="Arial, sans-serif" fill="#475569">管理</text>
  <path d="M552 100c40-34 92-34 132 0" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
  <text x="566" y="86" font-size="13" font-family="Arial, sans-serif" fill="#64748b">Pod削除 → 自然復旧</text>
</svg>
